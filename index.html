<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Badunks</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/tile.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      cursor: none;
    }
    body.show-cursor { cursor: default; }
    .board-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      padding: 0;
      box-sizing: border-box;
    }
    .tap-hint {
      position: fixed;
      bottom: 32px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 32px);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      letter-spacing: 0.5px;
      transition: opacity 0.5s;
      text-align: center;
      max-width: 80vw;
    }
    .tap-hint.hidden { opacity: 0; pointer-events: none; }

    /* Mobile portrait — center below status bar/notch/island */
    @media (max-width: 600px) and (orientation: portrait) {
      .board-wrap {
        align-items: center;
        padding: calc(env(safe-area-inset-top, 20px) + 10px) 0 0 0;
      }
      .tap-hint { display: none; }
    }

    /* iOS home screen banner */
    .ios-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 14px 20px;
      padding-bottom: calc(env(safe-area-inset-bottom, 14px) + 14px);
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 2000;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      transition: transform 0.3s ease;
    }
    .ios-banner.dismissed { transform: translateY(100%); pointer-events: none; }
    .ios-banner-icon {
      width: 36px;
      height: 36px;
      background: #1a1a1a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ios-banner-text {
      flex: 1;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      line-height: 1.4;
    }
    .ios-banner-text strong {
      color: #fff;
      font-weight: 600;
    }
    .ios-banner-close {
      background: none;
      color: rgba(255,255,255,0.3);
      font-size: 20px;
      padding: 4px 8px;
      cursor: pointer;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="board-wrap" id="board-container"></div>
  <div class="tap-hint" id="tap-hint">double-tap for settings</div>
  <script>
    // Audio unlock — runs BEFORE module scripts, plain JS, no imports
    // Creates AudioContext on first touch and stores on window for main.js
    // Short MP3 with REAL audio energy — forces iOS audio session
    // from "ambient" (respects mute switch) to "playback" (ignores it)
    var UNLOCK_MP3 = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYoRBqpAAAAAAD/+1DEAAAH+AJX9AAAIiMGSz8wAABFgBAAKAAHBAEDPnPggCAIHJKAgGP8oCAJ/y4f/Lh/8uH4IAQBD6gICAYPl3/5c//BAEHwfB8oCCoBh+X//y7///ggCAJwfUBAQDAMf////4IAgCcH1AQEAx/////+CAIAnB9QEBAMP/////ggCAIAfB8=';

    window.__audioCtx = null;
    window.__audioReady = false;
    function __unlockAudio(e) {
      if (window.__audioReady) return;
      window.__audioReady = true;
      try {
        // Step 1: HTML Audio with real content switches iOS audio session
        // to "playback" mode which ignores the hardware mute switch
        var a = new Audio(UNLOCK_MP3);
        a.setAttribute('playsinline', '');
        a.play().catch(function(){});

        // Step 2: Create and unlock AudioContext
        var AC = window.AudioContext || window.webkitAudioContext;
        window.__audioCtx = new AC();
        window.__audioCtx.resume();
        var b = window.__audioCtx.createBuffer(1,1,window.__audioCtx.sampleRate);
        var s = window.__audioCtx.createBufferSource();
        s.buffer = b;
        s.connect(window.__audioCtx.destination);
        s.start();
        var d = document.getElementById('audio-debug');
        if (d) { d.textContent = 'AUDIO: unlocked via ' + e.type; d.style.background = 'rgba(0,128,0,0.9)'; }
      } catch(err) {
        var d = document.getElementById('audio-debug');
        if (d) { d.textContent = 'AUDIO ERR: ' + err.message; }
      }
      document.removeEventListener('touchstart', __unlockAudio, true);
      document.removeEventListener('touchend', __unlockAudio, true);
      document.removeEventListener('click', __unlockAudio, true);
    }
    document.addEventListener('touchstart', __unlockAudio, true);
    document.addEventListener('touchend', __unlockAudio, true);
    document.addEventListener('click', __unlockAudio, true);
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
