batch_size: 5
stop_after_perfect: 3
eval_mode: vision

test_inputs:
  - "Add a new MealsIllustration for the Provisions page — a cozy kitchen scene with a cast iron pot, wooden cutting board, and fresh herbs"
  - "Create a FamilyDogIllustration showing Maple the golden doodle sitting in a meadow"
  - "Add a WinterIllustration for a seasonal home screen variant — snow on the barn roof, bare trees, frozen pond"
  - "Update the CottageIllustration to add a wood pile stacked against the side wall"
  - "Create a BeehiveIllustration for a future apiary section — hive boxes, flowers, bees"
  - "Add a PantryIllustration showing shelves of preserved jars, root vegetables, and hanging dried herbs"
  - "Create a WeatherIllustration for a weather widget — rolling clouds, rain drops, and a partial rainbow"
  - "Add a WorkshopIllustration — workbench, tools on pegboard, sawdust pile"
  - "Create a GreenhouseIllustration — glass panes, seed trays, misting can, tomato plants"
  - "Update the GardenIllustration to add a trellis with climbing vines on the right side"
  - "Add a HarvestBasketIllustration — wicker basket overflowing with apples, squash, and carrots"
  - "Create a NightSkyIllustration for a sleep/evening mode — full moon, Milky Way arc, silhouetted hills"
  - "Add a ChickenCoopIllustration — small wooden structure, nesting boxes visible through door, chickens on roost"
  - "Create a MapleTreeIllustration for autumn season — orange and red leaves, swing hanging from branch"
  - "Add a RainBarrelIllustration — wooden barrel, downspout, overflow trough, mint growing beside it"
  - "Update FarmIllustration to add a water trough near the fence line"
  - "Create a SeedlingIllustration for a spring-start widget — small pots in a tray, just sprouting"
  - "Add a FireplaceIllustration for the Household winter widget — stone hearth, glowing embers, log stack"
  - "Create a SunriseIllustration for the morning home screen — fog lifting over hills, amber sky, rooster silhouette"
  - "Add a FencelineIllustration as a decorative section divider — split-rail fence with wildflowers"

eval_criteria:
  - name: depicts_subject
    description: "The illustration visually depicts what was requested — a maple tree looks like a tree with a canopy, a dog looks like a dog with a recognizable body shape, a barn looks like a barn. A trunk rectangle alone with no leaves does NOT pass. The subject must be identifiable from the shapes."
  - name: paper_cutout_style
    description: "The illustration uses the paper cut-out layered aesthetic: flat colored shapes stacked at distinct depth planes (sky/background, mid-hills, foreground ground), NOT gradients, photorealistic rendering, or plain rectangles. At least 4 visible shape layers must be present, each a distinct color from the P palette."
  - name: color_variety
    description: "The illustration uses BOTH dark palette values (layer1/layer2 for backgrounds) AND lighter/warmer values (layer5/layer6/layer7 for foreground, or amber/rust/cream for thematic elements like autumn leaves, fur, warm light). An illustration that is entirely dark greens with no warm or light accents fails."
  - name: complete_scene
    description: "The illustration renders a complete scene — sky or background fills the entire canvas, ground or terrain is present, and the primary subject is fully drawn (not a trunk with no canopy, not a body with no head). The viewBox is filled with content, not mostly black void."
  - name: exports_correctly
    description: "The output includes an 'export function' statement defining the illustration component, and the function name ends with 'Illustration'"
